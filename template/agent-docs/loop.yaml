# Loop runner project config. Read by agent-core's loop/runner.py from
# <repo-root>/agent-docs/loop.yaml.

# Env var whose value the runner passes to smoke scripts as $1.
# Omit if smoke scripts need no credential; they are then invoked with no args.
api_key_env: MY_SERVICE_API_KEY

# Services the smoke gate brings up before running a smoke script.
# Started in order; any service whose health_url already responds is skipped.
# Background services are terminated after the smoke script finishes;
# non-background commands must be idempotent and return once the service is up.
services:
  - name: database
    command: docker compose up -d db
    health_url: http://127.0.0.1:5432/
    startup_timeout_seconds: 300

  - name: server
    command: npm run dev
    cwd: app                 # relative to repo root; omit for repo root
    background: true         # runner owns the process lifecycle
    health_url: http://127.0.0.1:3000/health
    startup_timeout_seconds: 75
    env:                     # defaults only; the caller's environment wins
      DATABASE_URL: postgresql://localhost:5432/dev
